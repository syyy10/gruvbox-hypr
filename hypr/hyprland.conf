# global
monitor=,preferred,auto, 1
wsbind=1,eDP-1
exec-once=hyprctl setcursor Bibata-Modern-Ice 1
exec-once=$HOME/.config/hypr/autostart
exec-once=awww-daemon
exec-once=waybar
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
input {
    kb_layout=us 
    kb_variant=
    kb_model=
    kb_options=
    kb_rules=

    follow_mouse=1

    touchpad {
        natural_scroll=no
    }
}

misc{
    
}

general {
    gaps_in=3
    gaps_out=5
    border_size=0
    col.active_border=0xfff5c2e7
    col.inactive_border=0xff45475a
}

decoration {
    rounding=30
    active_opacity= 0.80
    inactive_opacity= 0.80
}
master{
    
}


# binds

bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow
bind=,XF86MonBrightnessUp,exec,brightnessctl set 30+
bind=,XF86MonBrightnessDown,exec,brightnessctl set 30-
bind=,XF86AudioRaiseVolume,exec,amixer set Master 5%+
bind=,XF86AudioLowerVolume,exec,amixer set Master 5%-
bind=,XF86AudioMute,exec,amixer set Master toggle
bind=SUPER,Q,killactive,
bind=SUPER,K, exec, hyprctl kill
bind=SUPER,M,exit,
bind=SUPER,V,togglefloating,
bind=SUPER,P,pseudo,
bind=SUPER,L,exec,~/.config/hypr/scripts/lock
bind=SUPER,left,movefocus,l
bind=SUPER,right,movefocus,r
bind=SUPER,up,movefocus,u
bind=SUPER,down,movefocus,d
bind=SUPER,1,workspace,1
bind=SUPER,2,workspace,2
bind=SUPER,3,workspace,3 
bind=SUPER,4,workspace,4
bind=SUPER,5,workspace,5
bind=SUPER,6,workspace,6
bind=SUPER,7,workspace,7
bind=SUPER,8,workspace,8
bind=SUPER,9,workspace,9
bind=SUPER,0,workspace,10
bind=ALT,1,movetoworkspace,1
bind=ALT,2,movetoworkspace,2
bind=ALT,3,movetoworkspace,3
bind=ALT,4,movetoworkspace,4
bind=ALT,5,movetoworkspace,5
bind=ALT,6,movetoworkspace,6
bind=ALT,7,movetoworkspace,7
bind=ALT,8,movetoworkspace,8
bind=ALT,9,movetoworkspace,9
bind=ALT,0,movetoworkspace,10
bindl=,switch:Lid Switch,exec,~/.config/hypr/scripts/lock
bindl=,switch:Lid Switch,exec,systemctl suspend


# apps

bind=SUPER,E,exec,thunar
bind=SUPER,D,exec,rofi -show drun
bind=SUPER,RETURN,exec,kitty
bind=SUPER,B,exec,firefox
bind=SUPER,W,exec,~/.config/hypr/scripts/wallpaper
