# ~/.config/kitty/kitty.conf

# ── Opacity ───────────────────────────────────────────────────────────────────
background_opacity 0.9

# ── Gruvbox Dark colorscheme ──────────────────────────────────────────────────

# Background / Foreground
background  #282828
foreground  #ebdbb2

# Cursor
cursor            #ebdbb2
cursor_text_color #282828

# Selection
selection_background #d65d0e
selection_foreground #282828

# Normal colors
color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984

# Bright colors
color8   #928374
color9   #fb4934
color10  #b8bb26
color11  #fabd2f
color12  #83a598
color13  #d3869b
color14  #8ec07c
color15  #ebdbb2

# URL color
url_color #83a598

# ── Font ──────────────────────────────────────────────────────────────────────
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ── Window ────────────────────────────────────────────────────────────────────
window_padding_width 8
hide_window_decorations no

# ── Misc ──────────────────────────────────────────────────────────────────────
enable_audio_bell no
confirm_os_window_close 0
